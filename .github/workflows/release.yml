on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.7.0)"
        required: true
        type: string

name: Create release

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in semver format (e.g. 0.7.0)"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable

      - name: Update version in Cargo.toml
        run: sed -i '0,/^version = ".*"/s//version = "${{ inputs.version }}"/' Cargo.toml

      - name: Update version in pyproject.toml
        run: sed -i '0,/^version = ".*"/s//version = "${{ inputs.version }}"/' pyproject.toml

      - name: Update version in README.md
        run: sed -i 's/rust-strings = "[0-9]*\.[0-9]*\.[0-9]*"/rust-strings = "${{ inputs.version }}"/' README.md

      - name: Update Cargo.lock
        run: cargo update --workspace

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock pyproject.toml README.md
          git commit -m "Bump version to ${{ inputs.version }}"
          git push origin main

      - name: Create and push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Trigger release workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run release_rust.yml --ref "v${{ inputs.version }}"
          gh workflow run release_python.yml --ref "v${{ inputs.version }}"
