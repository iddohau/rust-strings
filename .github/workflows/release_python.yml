 on:
   workflow_dispatch:
   push:
     tags:
       - "v**"
 
 name: Python release
 
 env:
   name: rust-strings
 
 jobs:
   macos:
     runs-on: ${{ matrix.platform.runner }}
     strategy:
       matrix:
         platform:
           # - runner: macos-14
           #   target: x86_64
           - runner: macos-latest
             target: aarch64
         python_version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
     steps:
       - uses: actions/checkout@v4
       - uses: actions/setup-python@v5
         with:
           python-version: ${{ matrix.python_version }}
       - uses: dtolnay/rust-toolchain@stable
       - name: Build wheels
         uses: PyO3/maturin-action@v1
         with:
           target: ${{ matrix.platform.target }}
           args: --release -i python${{ matrix.python_version }} --features python_bindings --out dist
       - name: Install built wheel
         run: |
           pip install ${{ env.name }} --no-index --find-links dist --force-reinstall
           pip install pytest
           pytest
       - name: Upload wheels
         uses: actions/upload-artifact@v4
         with:
           name: wheels-macos-${{ matrix.platform.target }}-py${{ matrix.python_version }}
           path: dist
 
   windows:
     runs-on: windows-latest
     strategy:
       matrix:
         target: [x64, x86]
         python_version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
     steps:
       - uses: actions/checkout@v4
       - uses: actions/setup-python@v5
         with:
           python-version: ${{ matrix.python_version }}
           architecture: ${{ matrix.target }}
       - uses: dtolnay/rust-toolchain@stable
       - name: Build wheels
         uses: PyO3/maturin-action@v1
         with:
           target: ${{ matrix.target }}
           args: --release -i python${{ matrix.python_version }} --features python_bindings --out dist
       - name: Install built wheel
         run: |
           pip install ${{ env.name }} --no-index --find-links dist --force-reinstall
           pip install pytest
           pytest
       - name: Upload wheels
         uses: actions/upload-artifact@v4
         with:
           name: wheels-windows-${{ matrix.target }}-py${{ matrix.python_version }}
           path: dist
 
   linux:
     runs-on: ubuntu-latest
     strategy:
       matrix:
         target: [x86_64, i686]
         python_version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
     steps:
     - uses: actions/checkout@v4
     - uses: actions/setup-python@v5
       with:
         python-version: ${{ matrix.python_version }}
         architecture: x64
     - name: Build Wheels
       uses: PyO3/maturin-action@v1
       with:
         rust-toolchain: stable
         target: ${{ matrix.target }}
         manylinux: auto
         args: --release -i python${{ matrix.python_version }} --features python_bindings --out dist
     - name: Install built wheel
       if: matrix.target == 'x86_64'
       run: |
         pip install ${{ env.name }} --no-index --find-links dist --force-reinstall
         pip install pytest
         pytest
     - name: Upload wheels
       uses: actions/upload-artifact@v4
       with:
         name: wheels-linux-${{ matrix.target }}-py${{ matrix.python_version }}
         path: dist
 
   linux-cross:
     runs-on: ubuntu-latest
     strategy:
       matrix:
         target: [aarch64, armv7, s390x, ppc64le, ppc64]
         python_version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
     steps:
     - uses: actions/checkout@v4
     - name: Build Wheels
       uses: PyO3/maturin-action@v1
       with:
         rust-toolchain: stable
         target: ${{ matrix.target }}
         manylinux: auto
         args: --release -i python${{ matrix.python_version }} --features python_bindings --out dist
     - name: Upload wheels
       uses: actions/upload-artifact@v4
       with:
         name: wheels-linux-cross-${{ matrix.target }}-py${{ matrix.python_version }}
         path: dist
 
   sdist:
     runs-on: ubuntu-latest
     steps:
       - uses: actions/checkout@v4
       - name: Build sdist
         uses: PyO3/maturin-action@v1
         with:
           command: sdist
           args: --out dist
       - name: Upload sdist
         uses: actions/upload-artifact@v4
         with:
           name: wheels-sdist
           path: dist
 
   release:
     name: Release
     runs-on: ubuntu-latest
     needs:
     - macos
     - windows
     - linux-cross
     - linux
     - sdist
     steps:
       - uses: actions/download-artifact@v4
         with:
           pattern: wheels-*
           merge-multiple: true
           path: dist
       - name: Publish to PyPi
         env:
           MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
         uses: PyO3/maturin-action@v1
         with:
           command: upload
           args: --skip-existing dist/*
